    // Render images matching the keyword
    function renderImages(keyword) {
      const container = document.getElementById('images');
      container.innerHTML = '';
      const search = keyword.trim().toLowerCase();

      // Filter by tag
        const filtered = images.filter(img =>
        img.tags.join(' ').toLowerCase().includes(search)
        );

      // Show filtered images
      if (filtered.length === 0) {
        container.innerHTML = '<p>No images found for "' + keyword + '".</p>';
        return;
      }

      filtered.forEach(img => {
        const card = document.createElement('div');
        card.className = 'img-card';

        const image = document.createElement('img');
        image.src = img.url;
        image.alt = img.tags[0];

        image.style.cursor = 'pointer';
        image.onclick = () => {
        window.open(img.url, '_blank');
        };

        const tags = document.createElement('div');
        tags.className = 'tags';
        tags.textContent = 'Tags: ' + img.tags.join(', ');

        card.appendChild(image);
        card.appendChild(tags);
        container.appendChild(card);
      });
    }

    // Initial render
    renderImages('');

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', function() {
      renderImages(this.value);
    });
